<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCR 台版數據導航站</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- 樣式表 -->
    <link rel="stylesheet" href="style.css?v=4.0">

    <!-- 函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
    <!-- 載入覆蓋層 -->
    <div id="loading-overlay">
        <div class="loader-container">
            <h2 style="margin-bottom: 20px; text-align: center;">PCRD Data Hub</h2>
            <div class="loader-bar">
                <div id="loader-progress" class="loader-progress"></div>
            </div>
            <div id="loader-text" class="loader-text">正在初始化引擎...</div>
        </div>
        <div id="cors-warning" style="display: none; margin-top: 30px; max-width: 400px; color: #ff6b6b; text-align: center; font-size: 0.85rem;">
            ⚠️ 檢測到使用 file:// 開啟。由於瀏覽器 CORS 限制，資料庫下載可能會失敗。請使用 Live Server 或本地 HTTP 伺服器開啟。
        </div>
    </div>

    <!-- 導航列 -->
    <nav class="navbar">
        <div class="nav-logo">
            <span class="icon">⚔️</span> PCRD Data Hub
        </div>
        <div class="nav-tabs">
            <button id="tab-cb-btn" class="tab-btn active" onclick="switchTab('clan-battle')">戰隊戰</button>
            <button id="tab-characters-btn" class="tab-btn" onclick="switchTab('characters')">角色圖鑑</button>
            <button id="tab-map-btn" class="tab-btn" onclick="switchTab('map')">劇情地圖</button>
            <button id="tab-events-btn" class="tab-btn" onclick="switchTab('events')">活動日曆</button>
            <button id="tab-stats-btn" class="tab-btn" onclick="switchTab('stats')">作業統計</button>
            <button id="tab-diff-btn" class="tab-btn" onclick="switchTab('diff')">資料比對</button>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span class="region-badge" style="
                background: linear-gradient(135deg, rgba(232, 56, 117, 0.08) 0%, rgba(196, 36, 106, 0.08) 100%);
                color: var(--accent-color);
                border: 1px solid rgba(232, 56, 117, 0.2);
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 0.85rem;
                font-weight: 700;
                letter-spacing: 0.5px;
                box-shadow: 0 2px 6px rgba(232, 56, 117, 0.05);
            ">台服 (TW)</span>
            <a href="../index.html" class="nav-back">
                <span>←</span> 回到工具
            </a>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="container">
        <!-- 分頁 1: 戰隊戰 -->
        <div id="clan-battle-tab" class="tab-content active"></div>

        <!-- 分頁 2: 角色 -->
        <div id="characters-tab" class="tab-content"></div>

        <!-- 分頁 3: 劇情地圖 -->
        <div id="map-tab" class="tab-content"></div>

        <!-- 分頁 4: 活動 -->
        <div id="events-tab" class="tab-content"></div>

        <!-- 分頁 5: 作業統計 -->
        <div id="stats-tab" class="tab-content"></div>

        <!-- 分頁 6: 資料比對 -->
        <div id="diff-tab" class="tab-content"></div>
    </main>

    <!-- 角色詳情彈窗 -->
    <div id="char-detail-modal" class="modal-overlay" onclick="if(event.target === this) CharactersModule.closeDetail()">
        <div class="modal-content glass-card" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="CharactersModule.closeDetail()">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- 程式腳本 -->
    <script src="db.js?v=5.1.3"></script>
    <script src="avatar-service.js?v=5.2.1"></script>
    <script src="story-asset-service.js?v=5.1.3"></script>
    <script src="chapter-data.js?v=5.1.3"></script>
    <script src="characters.js?v=5.1.3"></script>
    <script src="clan-battle.js?v=5.1.3"></script>
    <script src="map.js?v=5.2.1"></script>
    <script src="events.js?v=5.1.3"></script>
    <script src="usage-stats.js?v=5.1.3"></script>
    <script src="diff.js?v=5.1.3"></script>

    <script>
        console.log("Main script block in index.html starting...");
        // 檢查是否為本地檔案
        if (window.location.protocol === 'file:') {
            document.getElementById('cors-warning').style.display = 'block';
        }

        // 切換分頁
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId + '-tab').classList.add('active');
            
            let btnId = tabId;
            if (tabId === 'clan-battle') btnId = 'cb';
            document.getElementById('tab-' + btnId + '-btn').classList.add('active');

            // 如果分頁內容是空的，進行渲染
            if (tabId === 'clan-battle' && !ClanBattleModule.currentBattle) {
                ClanBattleModule.render();
            } else if (tabId === 'characters' && document.getElementById('characters-tab').innerHTML.trim() === '') {
                CharactersModule.render();
            } else if (tabId === 'map' && document.getElementById('map-tab').innerHTML.trim() === '') {
                QuestMapModule.render();
            } else if (tabId === 'events' && document.getElementById('events-tab').innerHTML.includes('loading-mini')) {
                EventsModule.render();
            } else if (tabId === 'stats' && document.getElementById('stats-tab').innerHTML.trim() === '') {
                UsageStatsModule.render();
            } else if (tabId === 'diff' && document.getElementById('diff-tab').innerHTML.trim() === '') {
                DatabaseDiffModule.render();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            const progress = document.getElementById('loader-progress');
            const text = document.getElementById('loader-text');
            const regionSelector = document.getElementById('region-selector');

            // 同步選擇器狀態
            if (regionSelector) {
                regionSelector.value = PCRDatabase.currentRegion;
            }

            try {
                // 載入資料庫
                await window.PCRDatabase.initDatabase((msg, pct) => {
                    text.innerText = msg;
                    progress.style.width = pct + '%';
                });

                // 移除載入遮罩
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);

                // 預設渲染首頁
                ClanBattleModule.render();
                
                // 預先載入活動資料
                EventsModule.render();
            } catch (err) {
                text.innerHTML = `
                    <div style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px;">
                        <span style="color: #ff6b6b; font-weight: bold; font-size: 1.05rem;">資料庫載入失敗！可能是網路連線問題，或日服數據源暫時不可用。</span>
                        <button onclick="localStorage.setItem('pcr_region', 'tw'); location.reload();" style="
                            padding: 10px 24px;
                            background: linear-gradient(135deg, #ff6b9d 0%, #e83875 100%);
                            color: white;
                            border: none;
                            border-radius: 20px;
                            font-weight: bold;
                            cursor: pointer;
                            box-shadow: 0 4px 12px rgba(232, 56, 117, 0.25);
                            transition: all 0.2s ease;
                            font-size: 0.9rem;
                        " onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
                            🔄 切換回台服 (TW) 重新載入
                        </button>
                    </div>
                `;
                console.error(err);
            }
        });
    </script>

    <!-- 版權聲明 Footer -->
    <footer style="
        margin-top: 48px;
        padding: 20px 24px;
        text-align: center;
        font-size: 0.75rem;
        color: rgba(100, 120, 150, 0.65);
        border-top: 1px solid rgba(100, 120, 150, 0.12);
        line-height: 1.8;
        letter-spacing: 0.03em;
    ">
        <p style="margin: 0 0 4px;">
            ©&nbsp;Cygames, Inc. &nbsp;/&nbsp; ©&nbsp;So-net Entertainment Taiwan Limited. &nbsp;All Rights Reserved.
        </p>
        <p style="margin: 0; font-size: 0.7rem; opacity: 0.75;">
            本站為非官方粉絲工具，所有遊戲素材版權均屬 Cygames 及台灣代理商台灣索尼網路娛樂股份有限公司所有。
        </p>
    </footer>

</body>
</html>
